    analysis, and strategy.

    # Passive Income Playbook
    *For: Purdue ME Student | International (F-1) | Focus: {income_query}*

    ## Your Income Opportunity Profile
    - Your unfair advantages (technical skills, multilingual, trading experience)
    - F-1 visa income rules summary (what IS and IS NOT allowed)
    - Starting position and realistic targets

    ## Top 5 Recommended Opportunities
    For each (table format):
    | Attribute | Details |
    |-----------|---------|
    | Opportunity | [Name] |
    | Category | [Investment / Digital Product / Content / SaaS] |
    | Monthly Income Potential | $X — $X at 6 months |
    | Startup Cost | $X |
    | Weekly Ongoing Work | X hrs/week once set up |
    | F-1 Legal Status | ✅ Legal / ⚠️ Verify / ❌ Avoid |
    | Your Advantage | [specific edge] |
    | First Step | [specific action with URL] |

    ## 30-Day Action Plan
    ### Week 1: Foundation
    - [ ] [specific task]
    - [ ] [specific task]

    ### Week 2: Launch
    - [ ] [specific task]

    ### Week 3-4: Optimize & Scale
    - [ ] [specific task]

    ## Income Milestones
    | Milestone | Target Date | Required Streams |
    |-----------|-------------|-----------------|
    | First $100/month | [month] | [streams] |
    | $500/month | [month] | [streams] |
    | $2,000/month | [month] | [streams] |

    ## Multilingual Edge
    - Specific ways to use Mandarin/Japanese skills for income

    ## Important: F-1 Visa Compliance
    - Summary of allowed income types
    - What to consult an immigration attorney about

    ## Disclaimer
